<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; connect-src 'self' https://viacep.com.br;">
    <title>Josimar - Portfólio Profissional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero-section">
        <h1>Josimar Bitencourt Pereira</h1>
        <p>Estudante de TI | Focado em Infraestrutura Cloud (AWS) e Segurança</p>
        <button id="btn-saiba-mais" class="cta-button">Saiba Mais</button>
    </header>
    <main>
        <section id="area-contato" class="contact-section">
            <h2>Entre em Contato</h2>
            <form id="portfolio-form">   
                <div class="honeypot-group">
                    <label for="honeypot">Deixe este campo em branco</label>
                    <input type="text" id="honeypot" name="honeypot" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="cep">CEP:</label>
                    <input type="text" id="cep" name="cep" maxlength="9" placeholder="Apenas números" required>
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade:</label>
                    <input type="text" id="cidade" name="cidade" readonly required>
                </div>
                <div class="form-group">
                    <label for="estado">Estado (UF):</label>
                    <input type="text" id="estado" name="estado" readonly required>
                </div>
                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="4" required></textarea>
                </div>
                <button type="submit" id="btn-enviar" class="submit-button">Enviar Mensagem</button>
            </form>
            <div id="mensagem-feedback"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
